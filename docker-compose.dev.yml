# Build FoxxyCode from the local Dockerfile (for development and smoke tests).
# See docs/docker.md
#
#   docker compose -f docker-compose.dev.yml build
#   docker compose -f docker-compose.dev.yml up -d --build

services:
  foxxycode:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${FOXXYCODE_VERSION:-dev}
        # Includes `gateway` so the built image can run `foxxycode gateway` (see command override below).
        BUILD_TAGS: ${FOXXYCODE_BUILD_TAGS:-http,scheduler,ui,memory,gateway}
    image: foxxycode-agent:${FOXXYCODE_VERSION:-dev}
    # Default runs `foxxycode http`. Override to run another mode, e.g. the messenger gateway:
    #   FOXXYCODE_COMMAND="gateway --cwd /workspace" docker compose -f docker-compose.dev.yml up -d --build
    command: ${FOXXYCODE_COMMAND:-http -H 0.0.0.0 -P 12345}
    ports:
      - "${FOXXYCODE_HTTP_PORT:-12345}:12345"
    working_dir: /workspace
    environment:
      FOXXYCODE_HOME: /home/user/.foxxycode
      FOXXYCODE_CWD: /workspace
      FOXXYCODE_CONFIG: /home/user/.foxxycode.yaml
      OPENAI_API_KEY: ${OPENAI_API_KEY-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY-}
      # Messenger gateway bot token (used only in gateway mode; empty if unset).
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN-}
    volumes:
      - ${FOXXYCODE_CONFIG-./config.yaml}:/home/user/.foxxycode.yaml:ro
      - ${FOXXYCODE_CWD-./workspace}:/workspace
      - ${FOXXYCODE_HOME-./foxxycode_home}:/home/user/.foxxycode
    healthcheck:
      test: ["CMD", "/bin/foxxycode", "--version"]
      interval: 5s
      timeout: 3s
      retries: 20
    logging:
      driver: "json-file"
      options:
        max-size: "100k"
