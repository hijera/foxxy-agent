# Build FoxxyCode from the local Dockerfile (for development and smoke tests).
# See docs/docker.md
#
#   docker compose -f docker-compose.dev.yml build
#   docker compose -f docker-compose.dev.yml up -d --build

services:
  foxxycode:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${FOXXYCODE_VERSION:-dev}
        BUILD_TAGS: ${FOXXYCODE_BUILD_TAGS:-http,scheduler,ui,memory}
    image: foxxycode-agent:${FOXXYCODE_VERSION:-dev}
    ports:
      - "${FOXXYCODE_HTTP_PORT:-12345}:12345"
    working_dir: /workspace
    environment:
      FOXXYCODE_HOME: /home/user/.foxxycode
      FOXXYCODE_CWD: /workspace
      FOXXYCODE_CONFIG: /home/user/.foxxycode.yaml
      OPENAI_API_KEY: ${OPENAI_API_KEY-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY-}
    volumes:
      - ${FOXXYCODE_CONFIG-./config.yaml}:/home/user/.foxxycode.yaml:ro
      - ${FOXXYCODE_CWD-./workspace}:/workspace
      - ${FOXXYCODE_HOME-./foxxycode_home}:/home/user/.foxxycode
    healthcheck:
      test: ["CMD", "/bin/foxxycode", "--version"]
      interval: 5s
      timeout: 3s
      retries: 20
    logging:
      driver: "json-file"
      options:
        max-size: "100k"
