# Build distroless image (Dockerfile scratch) and push to GitHub Container Registry.
# Git release tags: X.Y.Z (e.g. 0.2.0).
# Image tags: ghcr.io/<owner>/<repo>:<major>.<minor>.<patch> plus floating aliases when highest.
#
# Triggers:
#   - workflow_call from "Tag release on merge" (tag input required)
#   - push SemVer tag (manual tag push; commit must be on main)
#   - workflow_dispatch: optional tag input, else latest SemVer tag

name: Docker build and push

on:
  workflow_call:
    inputs:
      tag:
        description: SemVer git tag to build (X.Y.Z)
        required: true
        type: string
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: SemVer git tag to build (X.Y.Z); empty = latest SemVer tag
        required: false
        type: string

defaults:
  run:
    shell: bash

env:
  REGISTRY: ghcr.io
  BUILD_TAGS: "http,scheduler,ui,memory"

jobs:
  test-and-publish:
    name: Test, build distroless image, push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag != '' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Resolve release tag
        id: git_tag
        run: |
          set -euo pipefail
          git fetch --tags origin

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="$({ git tag -l | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' || true; } | sort -V | tail -1)"
            if [ -z "$TAG" ]; then
              echo "No SemVer git tags (X.Y.Z) on origin." >&2
              git tag -l >&2 || true
              exit 1
            fi
            git checkout --force "$TAG"
          fi

          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match X.Y.Z (got ${TAG})." >&2
            exit 1
          fi

          echo "Building commit $(git rev-parse --short HEAD) at ${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: external/ui/package-lock.json

      - name: Ensure tag is on main
        id: gate
        run: |
          TAG="${{ steps.git_tag.outputs.tag }}"
          git fetch origin main --tags
          TAG_SHA="$(git rev-parse "${TAG}^{commit}")"
          if git merge-base --is-ancestor "$TAG_SHA" origin/main; then
            echo "Tag ${TAG} is on main."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${TAG} (${TAG_SHA}) is not on branch main; skipping build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install ripgrep
        if: steps.gate.outputs.skip != 'true'
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run tests
        if: steps.gate.outputs.skip != 'true'
        run: make test

      - name: Compute image tags
        id: meta
        if: steps.gate.outputs.skip != 'true'
        env:
          REGISTRY: ${{ env.REGISTRY }}
        run: |
          set -euo pipefail
          GIT_TAG="${{ steps.git_tag.outputs.tag }}"
          IMAGE="${REGISTRY}/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"

          VERSION="${GIT_TAG}"
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"

          mapfile -t ALL_VERS < <(
            { git tag -l | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' || true; } | sort -V
          )
          if [ "${#ALL_VERS[@]}" -eq 0 ]; then
            echo "No SemVer tags found." >&2
            exit 1
          fi

          MAX_ALL_VER="${ALL_VERS[$((${#ALL_VERS[@]} - 1))]}"

          mapfile -t MM_VERS < <(
            printf '%s\n' "${ALL_VERS[@]}" | { grep -E "^${MAJOR}\\.${MINOR}\\.[0-9]+$" || true; } | sort -V
          )
          MAX_MM_VER="${MM_VERS[$((${#MM_VERS[@]} - 1))]}"

          mapfile -t MAJ_VERS < <(
            printf '%s\n' "${ALL_VERS[@]}" | { grep -E "^${MAJOR}\\.[0-9]+\\.[0-9]+$" || true; } | sort -V
          )
          MAX_MAJ_VER="${MAJ_VERS[$((${#MAJ_VERS[@]} - 1))]}"

          TAGS="${IMAGE}:${VERSION}"
          echo "Always push (overwrite): ${IMAGE}:${VERSION}"

          if [ "$VERSION" = "$MAX_MM_VER" ]; then
            TAGS+=$'\n'"${IMAGE}:${MAJOR}.${MINOR}"
            echo "Also push (overwrite): ${IMAGE}:${MAJOR}.${MINOR}"
          else
            echo "Skip ${IMAGE}:${MAJOR}.${MINOR} (max is ${MAX_MM_VER})."
          fi

          if [ "$VERSION" = "$MAX_MAJ_VER" ]; then
            TAGS+=$'\n'"${IMAGE}:${MAJOR}"
            echo "Also push (overwrite): ${IMAGE}:${MAJOR}"
          else
            echo "Skip ${IMAGE}:${MAJOR} (max is ${MAX_MAJ_VER})."
          fi

          if [ "$VERSION" = "$MAX_ALL_VER" ]; then
            TAGS+=$'\n'"${IMAGE}:latest"
            echo "Also push (overwrite): ${IMAGE}:latest"
          else
            echo "Skip latest (global max is ${MAX_ALL_VER})."
          fi

          {
            echo "version=${VERSION}"
            echo "push=true"
            echo "tags<<EOF"
            printf '%s\n' "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.meta.outputs.push == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.meta.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch distroless image
        if: steps.meta.outputs.push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            BUILD_TAGS=${{ env.BUILD_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
