# Build the JetBrains (IntelliJ-platform) plugin: a single cross-platform zip that bundles the
# foxxy binary for every desktop target under foxxy-bin/<os>-<arch>/.
#
# Triggers:
#   - pull_request touching the plugin or the Go/UI sources it bundles -> build + upload artifact
#   - workflow_dispatch -> build + upload artifact
#   - workflow_call from "Tag release on merge" (tag input) -> build + attach zip to the Release
#   - push SemVer tag -> build + attach zip to the Release

name: IntelliJ plugin

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "editors/intellij/**"
      - "cmd/**"
      - "internal/**"
      - "external/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/intellij-plugin.yaml"
  workflow_dispatch:
  workflow_call:
    inputs:
      tag:
        description: SemVer git tag to build and attach (X.Y.Z)
        required: true
        type: string
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build plugin zip
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to attach assets to the Release on tag builds

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag != '' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Resolve version
        id: ver
        run: |
          set -euo pipefail
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=""
          fi
          if [ -n "$TAG" ]; then
            if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Tag must match X.Y.Z (got ${TAG})." >&2
              exit 1
            fi
            echo "version=${TAG}" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: external/ui/package-lock.json

      - name: Build plugin (all platforms)
        run: make intellij-build PLUGIN_VERSION="${{ steps.ver.outputs.version }}"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: foxxy-intellij-${{ steps.ver.outputs.version }}
          path: editors/intellij/build/distributions/*.zip
          if-no-files-found: error

      - name: Attach plugin to GitHub Release
        if: steps.ver.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          files: editors/intellij/build/distributions/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
