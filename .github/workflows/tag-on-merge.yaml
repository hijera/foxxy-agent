# On each push to main: bump patch SemVer tag on HEAD (if untagged), then build Docker image and release binaries.
# Child workflows are invoked via workflow_call (GITHUB_TOKEN tag pushes do not fire push: tags workflows).

name: Tag release on merge

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-tag-main
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  tag-version:
    name: Bump and push version tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags origin

      - name: Check if commit already has a tag
        id: check
        run: |
          if [ -n "$(git tag --points-at HEAD)" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Commit already has a tag, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get latest SemVer tag and bump patch
        id: version
        if: steps.check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          LATEST="$({ git tag -l | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' || true; } | sort -V | tail -1)"
          if [ -z "$LATEST" ]; then
            LATEST="0.1.0"
          fi
          NEW_VERSION="$(echo "$LATEST" | awk -F. '{$3=$3+1; OFS="."; print $1,$2,$3}')"
          echo "previous=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${LATEST} -> ${NEW_VERSION}"

      - name: Create and push tag
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.version.outputs.tag }}"
          git tag -a "$TAG" -m "Release $TAG (auto-tag on merge)"
          git push origin "$TAG"

  docker:
    name: Docker build and push
    needs: tag-version
    if: needs.tag-version.outputs.skip != 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-build-push.yaml
    with:
      tag: ${{ needs.tag-version.outputs.tag }}
    secrets: inherit

  binaries:
    name: Release binaries
    needs: tag-version
    if: needs.tag-version.outputs.skip != 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/release-binaries.yaml
    with:
      tag: ${{ needs.tag-version.outputs.tag }}
    secrets: inherit
