# api_key must be the provider secret string (often starts with sk-...), never a web page URL.
providers:
  - name: openai
    type: openai
    api_key: "${OPENAI_API_KEY}"

  # Local Ollama or llama.cpp server (OpenAI-compatible)
  # - name: local
  #   type: openai
  #   api_base: "http://localhost:11434/v1"
  #   api_key: "~"

  # Anthropic
  # - name: anthropic
  #   type: anthropic
  #   api_key: "${ANTHROPIC_API_KEY}"

  # OpenAI-compatible (DeepSeek, Groq, Together, neuraldeep, etc.)
  # Use type openai and include /v1 in api_base.
  # - name: deepseek
  #   type: openai
  #   api_base: "https://api.deepseek.com/v1"
  #   api_key: "${DEEPSEEK_API_KEY}"
  # - name: neuraldeep
  #   type: openai
  #   api_base: "https://api.neuraldeep.ru/v1"
  #   api_key: "${NEURALDEEP_API_KEY}"

models:
  - model: "openai/gpt-4o"
    max_tokens: 8192
    temperature: 0.2

  # - model: "neuraldeep/gpt-oss-120b"
  #   max_tokens: 8192
  #   temperature: 0.2

agent:
  model: "openai/gpt-4o"
  max_turns: 30
  max_tokens_per_turn: 200000

sessions:
  # Directory to store session bundles.
  # Leave empty to use default $CODDY_HOME/sessions.
  dir: ""

prompts:
  # Directory containing prompt templates (Go text/template).
  # Leave empty to use built-in templates. Paths support ~ and ${CWD} (session cwd at render time).
  # Template fields: {{.CWD}}, {{.Tools}}, {{.Skills}}, {{.TodoList}}, {{.Memory}}, {{.UTCNow}}
  # (use {{if .TodoList}} ... {{end}} for optional checklist injection; see docs/config.md)
  dir: ""
  # File names inside prompts.dir (defaults: agent.md, plan.md)
  # agent_prompt: "agent.md"
  # plan_prompt: "plan.md"

skills:
  # install_dir is used by coddy skills install / coddy skills uninstall.
  # Default: $CODDY_HOME/skills (typically ~/.coddy/skills)
  install_dir: ""

  # dirs is the list of directories scanned for skills and rules.
  # Searched in order. When empty, defaults are
  # ${CODDY_HOME}/skills, ${CWD}/.skills, ~/.cursor/skills, ~/.claude/skills
  dirs: []

mcp_servers: []
  # Example: filesystem MCP server
  # - name: "filesystem"
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/home/user/projects"]
  #   env: []

  # Example: GitHub MCP server
  # - name: "github"
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-github"]
  #   env:
  #     - name: "GITHUB_PERSONAL_ACCESS_TOKEN"
  #       value: "${GITHUB_TOKEN}"

tools:
  # When true, run_command asks permission unless the command matches command_allowlist below.
  require_permission_for_commands: true
  require_permission_for_writes: false
  # When true, file tools reject paths outside cwd. When false, those paths are allowed
  # only after the user approves a permission prompt for that path.
  restrict_to_cwd: true

  # Commands that never require user permission.
  # Supports exact match and prefix match (prefix + space + any args).
  # Use "*" to allow all commands without asking (disables permission for commands entirely).
  command_allowlist:
    - "go build"
    - "go test"
    - "go vet"
    - "go fmt"
    - "go mod tidy"
    - "make"
    - "git status"
    - "git diff"
    - "git log"

  # When non-empty, all tool permission prompts are auto-approved (ACP and HTTP). Dangerous; use only in trusted environments.
  # permission_master_key: "${CODDY_PERMISSION_MASTER_KEY}"

# OpenAI-compatible HTTP API (only when built with: go build -tags=http). See docs/http-api.md
# httpserver:
#   host: "127.0.0.1"
#   port: 8080

# Cron scheduler (external/scheduler + lib/, tools/; build with: go build -tags=scheduler).
# Jobs live under scheduler.dir (${CODDY_HOME}/scheduler when dir is empty or omitted): YAML frontmatter description, schedule
# (5-field crontab, UTC), optional cwd, model, mode; markdown body is the one-shot agent instruction. Sidecars: basename.state,
# basename.lock during a run.
# Enable with scheduler.enabled and/or coddy acp|http -scheduler-enabled.
# scheduler:
#   enabled: false
#   dir: ""              # empty = ${CODDY_HOME}/scheduler
#   poll_interval: "1m"
#   max_queue: 10        # concurrent scheduled runs (default); when saturated the daemon skips extras until slots free (see logs)
#   timeout: "30m"       # per scheduled agent run

# Long-term memory copilot (external/memory; always in the binary). Toggle with memory.enabled.
# Stores markdown under memory.dir (default ${CODDY_HOME}/memory) and <session cwd>/memory (project). Injects text into the
# same {{.Memory}} section as session notes; main agent never sees memory_* tools.
# memory:
#   enabled: false
#   model: "" # optional selector from models[]; empty uses the active agent model
#   dir: "" # default ${CODDY_HOME}/memory when empty
#   recall_max_turns: 6
#   persist_max_turns: 4
#   copilot_max_tokens: 4096
#   max_search_hits: 8

logger:
  level: "info"
  # outputs: ["stderr"]          # default when omitted
  # outputs: ["stdout", "file"] # example: tee to console and file
  # file: "${CODDY_HOME}/coddy.log"  # required when outputs includes "file"
  format: "text"
  rotation:
    max_size_mb: 0
    max_files: 0
