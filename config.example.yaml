# yaml-language-server: $schema=https://raw.githubusercontent.com/hijera/foxxy-agent/main/docs/config.schema.json
# Full field reference: docs/config-reference.md

# .env file support
# If $FOXXYCODE_HOME/.env exists, it is loaded at startup before config.yaml is parsed.
# Variables already set in the process environment are NOT overridden — .env is a fallback only.
# Use it to keep secrets out of config.yaml without touching your shell profile:
#
#   ~/.foxxycode/.env
#   ──────────────
#   OPENAI_API_KEY=sk-...
#   TELEGRAM_BOT_TOKEN=8992982910:AAF...
#   ANTHROPIC_API_KEY=sk-ant-...
#
# Supported syntax: KEY=value, export KEY=value, "quoted values", # comments.

# api_key must be the provider secret string (often starts with sk-...), a "${ENV}" reference, or empty to use NAME_API_KEY at runtime; never a web page URL.
providers:
  - name: openai
    type: openai
    api_key: "${OPENAI_API_KEY}"
    # Optional credential helper: when api_key is empty, this command is run via the
    # shell and its trimmed stdout is used as the key (like git/docker credential
    # helpers or AWS credential_process). Lets a provider fetch short-lived or
    # login-issued keys without storing a static secret. Falls back to NAME_API_KEY.
    # api_key_command: "my-cli print-token"
    # Optional outbound proxy for this provider only (http, https, socks5, socks5h).
    # proxy: "http://127.0.0.1:8888"
    # proxy: "socks5h://127.0.0.1:1080"

  # Local Ollama or llama.cpp server (OpenAI-compatible)
  # - name: local
  #   type: openai
  #   api_base: "http://localhost:11434/v1"
  #   api_key: "~"

  # Anthropic
  # - name: anthropic
  #   type: anthropic
  #   api_key: "${ANTHROPIC_API_KEY}"

  # OpenAI-compatible (DeepSeek, Groq, Together, etc.)
  # Use type openai and include /v1 in api_base.
  # - name: deepseek
  #   type: openai
  #   api_base: "https://api.deepseek.com/v1"
  #   api_key: "${DEEPSEEK_API_KEY}"

  # NeuralDeep hub: OpenAI-compatible with a fixed endpoint, so api_base is
  # neither needed nor honoured (requests always go to https://api.neuraldeep.ru/v1).
  # - name: neuraldeep
  #   type: neuraldeep
  #   api_key: "${NEURALDEEP_API_KEY}"

models:
  - model: "openai/gpt-4o"
    max_tokens: 8192
    temperature: 0.2
    multimodal: true              # model accepts image/file inputs; UI shows file attachment button

  # Reasoning models expose a reasoning-level selector in the composer.
  # Levels are auto-detected from the model id (gpt-5* -> minimal,low,medium,high;
  # o-series and Claude thinking models -> low,medium,high). Override or disable below.
  # - model: "openai/gpt-5"
  #   max_tokens: 8192
  #   reasoning_default: medium       # level pre-selected for new chats (must be a valid level)
  #   # reasoning_levels: [low, high] # optional: override the offered levels; [] hides the selector

  # - model: "neuraldeep/gpt-oss-120b"
  #   max_tokens: 8192
  #   temperature: 0.2
  #   multimodal: false

agent:
  model: "openai/gpt-4o"
  max_turns: 30
  max_tokens_per_turn: 200000

sessions:
  # Directory to store session bundles.
  # Leave empty to use default $FOXXYCODE_HOME/sessions.
  dir: ""

prompts:
  # Directory containing prompt templates (Go text/template).
  # Leave empty to use built-in templates. Paths support ~ and ${CWD} (session cwd at render time).
  # Template fields: {{.CWD}}, {{.Tools}}, {{.Skills}}, {{.TodoList}}, {{.Memory}}, {{.UTCNow}}
  # (use {{if .TodoList}} ... {{end}} for optional checklist injection; see docs/config.md)
  dir: ""
  # File names inside prompts.dir (defaults: agent.md, plan.md)
  # agent_prompt: "agent.md"
  # plan_prompt: "plan.md"
  # Per-provider prompts: pick a system prompt tuned to the active model, resolved
  # most-specific first:
  #   agent.<model-slug>.md   e.g. agent.openai-gpt-4o.md  (model-list id, "/" -> "-")
  #   agent.<family>.md       e.g. agent.anthropic.md / agent.gemini.md
  #   agent.md                shared fallback
  # Family defaults are built in; per-model files live in dir (this prompts.dir).
  # Enabled by default; set to false to always use the shared agent.md.
  per_provider:
    enabled: true

skills:
  # dirs is the list of directories scanned for skills and rules.
  # Searched in order. When empty, defaults are
  # ${FOXXYCODE_HOME}/skills, ${CWD}/.skills, ~/.cursor/skills, ~/.claude/skills
  dirs: []

mcp_servers: []
  # Example: filesystem MCP server
  # - name: "filesystem"
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/home/user/projects"]
  #   env: []

  # Example: GitHub MCP server
  # - name: "github"
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-github"]
  #   env:
  #     - name: "GITHUB_PERSONAL_ACCESS_TOKEN"
  #       value: "${GITHUB_TOKEN}"

tools:
  # Controls when the agent asks for user approval before running tools.
  # ask: always prompt for commands and file writes (default)
  # accept_edits: auto-approve file writes; prompt for commands
  # bypass: never ask for permission
  permission_mode: ask

  # Commands that never require user permission.
  # Supports exact match and prefix match (prefix + space + any args).
  # Use "*" to allow all commands without asking (disables permission for commands entirely).
  command_allowlist:
    - "go build"
    - "go test"
    - "go vet"
    - "go fmt"
    - "go mod tidy"
    - "make"
    - "git status"
    - "git diff"
    - "git log"

  # TCP dial timeout for SSH connections in seconds (default: 30).
  # ssh_connect_timeout: 30

# OpenAI-compatible HTTP API (only when built with: go build -tags=http). Embedded SPA from GET / adds -tags=ui with http. See docs/http-api.md
# httpserver:
#   host: "127.0.0.1"
#   port: 8080

# Cron scheduler (external/scheduler + lib/, tools/; build with: go build -tags=scheduler).
# Jobs live under scheduler.dir (${FOXXYCODE_HOME}/scheduler when dir is empty or omitted): YAML frontmatter description, schedule
# (5-field crontab, UTC), optional cwd, model, mode; markdown body is the one-shot agent instruction. Sidecars: basename.state,
# basename.lock during a run.
# Enable with scheduler.enabled and/or foxxycode acp|http -scheduler-enabled.
# scheduler:
#   enabled: false
#   dir: ""              # empty = ${FOXXYCODE_HOME}/scheduler
#   max_queue: 10        # concurrent scheduled runs (default); when saturated the daemon skips extras until slots free (see logs)
#   timeout: "30m"       # per scheduled agent run

# Long-term memory copilot (external/memory; always in the binary). Toggle with memory.enabled.
# Stores markdown under memory.dir (default ${FOXXYCODE_HOME}/memory) and <session cwd>/memory (project). Injects text into the
# same {{.Memory}} section as session notes; main agent never sees memory_* tools.
# memory.model is used ONLY for recall + persist LLM calls. Set it to an exact models[].model id when you want memory
# pinned independently of agent.model (example: "rpa/gpt-oss:120b"). Leave empty to reuse the session or agent default model.
# memory:
#   enabled: false
#   model: ""
#   dir: "" # default ${FOXXYCODE_HOME}/memory when empty
#   recall_max_turns: 6
#   persist_max_turns: 12
#   copilot_max_tokens: 4096
#   max_search_hits: 8

# Automatic context compaction: when the running prompt approaches the model's context window
# (models[].max_context_tokens), older turns are summarized into one message so the session can
# continue. Enabled by default; it only fires near the window. compaction.model is used ONLY for
# the summary pass — leave empty to reuse agent.model.
# Two engines: "coddy" (default) keeps a summary row and replays only the window after it, and
# enables the manual /compact command; "opencode" flags older turns and filters them from the
# payload.
# compaction:
#   engine: coddy           # coddy (default) | opencode
#   enabled: true
#   model: ""
#   threshold_percent: 80   # trigger at this % of the model context window (opencode clamps 50..99)
#   keep_recent_turns: 2    # most recent user turns kept verbatim
#   max_tokens: 4096        # completion cap for the summary (opencode engine only)

# Automatic session title: after the first exchange in a fresh, non-pinned session, a hidden
# internal "title" agent generates a short thread title. Runs backend-side for all clients
# (SPA, IntelliJ, VS Code, ACP, CLI). A user-pinned title always wins and is never overwritten.
# title.model is used ONLY for the title pass — leave empty to reuse agent.model.
# title:
#   enabled: true
#   model: ""
#   max_tokens: 64          # completion cap for the title

# Messenger gateways (external/gateway/; build with: go build -tags gateway.telegram or -tags gateway).
# Run the bot with: foxxycode gateway --config config.yaml
# gateways:
#   telegram:
#     enabled: false
#     token: "${TELEGRAM_BOT_TOKEN}"   # optional: omit to read TELEGRAM_BOT_TOKEN from env/.env
#     # proxy: "socks5h://127.0.0.1:1080"  # optional outbound proxy (http, https, socks5, socks5h)
#     # proxy: "http://proxy.example.com:3128"
#     rich_messages: true             # Bot API 10.1 Rich Messages: native Markdown, streamed
#                                     # "Thinking…" while tools run, collapsible tool list.
#                                     # Falls back to legacy formatting if unsupported. Default false.
#     admins: [98874093]               # Telegram user IDs with elevated rights
#     default_access: "all"           # all | admins | group:<name>
#     default_isolation: "individual" # individual | shared | admin
#     user_groups:
#       - name: "devs"
#         user_ids: [111222333, 444555666]
#     chats:
#       # Per-chat overrides (optional); chat_id is negative for groups/supergroups.
#       - chat_id: -1001234567890
#         isolation: "individual"
#         access: "all"
#       - chat_id: -1009876543210
#         isolation: "admin"      # only respond to admin users
#         access: "admins"

logger:
  level: "info"
  # outputs: ["stderr"]          # default when omitted
  # outputs: ["stdout", "file"] # example: tee to console and file
  # file: "${FOXXYCODE_HOME}/foxxycode.log"  # required when outputs includes "file"
  format: "text"
  rotation:
    max_size_mb: 0
    max_files: 0

# Embedded SPA preferences (desktop launcher and HTTP UI, built with -tags http,ui).
# ui:
#   locale: ""            # "" = auto-detect system/browser locale; or "en" / "ru"
#   send_mode: "enter"    # how the main composer submits:
#                         #   "enter"      Enter sends (Shift/Ctrl+Enter = newline)
#                         #   "ctrl_enter" Ctrl/Cmd+Enter sends (Enter = newline)
#                         #   "off"        keyboard send disabled (Send button only)

# Interactive browser automation tool (built with -tags browser; disabled by default).
# Drives a local Chrome/Chromium over the DevTools Protocol via chromedp.
# browser:
#   enabled: false          # turn on navigate/click/fill/screenshot/... tools
#   headless: true          # false to watch the automated session in a real window
#   executable_path: ""     # "" = auto-detect; or a path to a Chrome/Chromium binary
#   timeout_seconds: 30     # per-action timeout
