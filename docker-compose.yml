# Run the published image from GitHub Container Registry (no local Dockerfile build).
# See docs/docker.md and https://github.com/hijera/foxxy-agent/pkgs/container/foxxy-agent
#
#   export CODDY_IMAGE=ghcr.io/hijera/foxxy-agent:TAG   # optional
#   docker compose pull
#   docker compose up -d

services:
  foxxy:
    image: ${CODDY_IMAGE:-ghcr.io/hijera/foxxy-agent:latest}
    ports:
      - "${CODDY_HTTP_PORT:-12345}:12345"
    working_dir: /workspace
    environment:
      CODDY_HOME: /home/user/.coddy
      CODDY_CWD: /workspace
      CODDY_CONFIG: /home/user/.coddy/config.yaml
      OPENAI_API_KEY: ${OPENAI_API_KEY-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY-}
    volumes:
      - ${CODDY_CONFIG-./config.yaml}:/home/user/.coddy/config.yaml:ro
      - ${CODDY_CWD-./workspace}:/workspace
      - ${CODDY_HOME-./coddy_home}:/home/user/.coddy
    healthcheck:
      test: ["CMD", "/bin/foxxy", "--version"]
      interval: 5s
      timeout: 3s
      retries: 20
    logging:
      driver: "json-file"
      options:
        max-size: "100k"
