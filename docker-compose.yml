# Run the published image from GitHub Container Registry (no local Dockerfile build).
# See docs/docker.md and https://github.com/hijera/foxxycode-agent/pkgs/container/foxxycode-agent
#
#   export FOXXYCODE_IMAGE=ghcr.io/hijera/foxxycode-agent:TAG   # optional
#   docker compose pull
#   docker compose up -d

services:
  foxxycode:
    image: ${FOXXYCODE_IMAGE:-ghcr.io/hijera/foxxycode-agent:latest}
    # Default runs `foxxycode http`. Override to run another mode, e.g. the messenger gateway:
    #   FOXXYCODE_COMMAND="gateway --cwd /workspace" docker compose up -d
    # Note: the published GHCR image is built WITHOUT the `gateway` tag, so gateway mode
    # needs an image built with it (docker-compose.dev.yml, or a custom BUILD_TAGS).
    command: ${FOXXYCODE_COMMAND:-http -H 0.0.0.0 -P 12345}
    ports:
      - "${FOXXYCODE_HTTP_PORT:-12345}:12345"
    working_dir: /workspace
    environment:
      FOXXYCODE_HOME: /home/user/.foxxycode
      FOXXYCODE_CWD: /workspace
      FOXXYCODE_CONFIG: /home/user/.foxxycode/config.yaml
      OPENAI_API_KEY: ${OPENAI_API_KEY-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY-}
      # Messenger gateway bot token (used only in gateway mode; empty if unset).
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN-}
    volumes:
      - ${FOXXYCODE_CONFIG-./config.yaml}:/home/user/.foxxycode/config.yaml:ro
      - ${FOXXYCODE_CWD-./workspace}:/workspace
      - ${FOXXYCODE_HOME-./foxxycode_home}:/home/user/.foxxycode
    healthcheck:
      test: ["CMD", "/bin/foxxycode", "--version"]
      interval: 5s
      timeout: 3s
      retries: 20
    logging:
      driver: "json-file"
      options:
        max-size: "100k"
