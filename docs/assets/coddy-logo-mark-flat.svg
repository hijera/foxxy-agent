<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Coddy">
  <defs>
    <linearGradient id="cmf-plate" x1="10" y1="8" x2="54" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c1c22"/>
      <stop offset="1" stop-color="#101014"/>
    </linearGradient>
    <linearGradient id="cmf-stroke" x1="10" y1="10" x2="46" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f5f3ff"/>
      <stop offset="0.5" stop-color="#ddd6fe"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="cmf-stroke-inner" x1="14" y1="14" x2="42" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c4b5fd" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#9333ea" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="cmf-plate-glow" cx="50%" cy="40%" r="58%">
      <stop offset="0" stop-color="#9333ea" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#9333ea" stop-opacity="0"/>
