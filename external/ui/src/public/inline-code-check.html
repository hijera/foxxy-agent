<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inline code alignment (fixture)</title>
    <script type="module" src="/layoutScrollFixtureCss.ts"></script>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg, #121212);
      }
      .fixture-wrap {
        max-width: 920px;
        margin: 48px auto;
        padding: 0 14px;
      }
    </style>
  </head>
  <body>
    <div class="fixture-wrap">
      <div class="msg-assistant-stack">
        <div class="msg msg-assistant">
          <div class="md">
            <h3>How to use</h3>
            <ol>
              <li>
                Create the file
                <code class="md-inline-code" data-testid="md-inline-code" title="Copy"
                  >docker-compose.yaml</code
                >
              </li>
              <li>
                Adjust paths - in
                <code class="md-inline-code" title="Copy">docker-compose.yaml</code>
                under volumes add:
                <ul>
                  <li>
                    <code class="md-inline-code" title="Copy"
                      >./qbittorrent:/config</code
                    >
                  </li>
                  <li>
                    <code class="md-inline-code" title="Copy"
                      >./qbittorrent_watch:/watch</code
                    >
                  </li>
                </ul>
              </li>
              <li>
                Start the stack with
                <code class="md-inline-code" title="Copy">docker compose up -d</code>
              </li>
              <li>
                Open
                <code class="md-inline-code" title="Copy"
                  >http://localhost:8080</code
                >, login
                <code class="md-inline-code" title="Copy">admin</code>.
              </li>
            </ol>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
