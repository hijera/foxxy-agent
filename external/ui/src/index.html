<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>Coddy Agent</title>
    <link rel="icon" href="/coddy-favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script>
      (function () {
        var LIGHT = { light: 1 };
        var VALID = {
          dark: 1,
          light: 1,
          midnight: 1,
          "solarized-dark": 1,
          monokai: 1,
          nord: 1,
          "rose-pine": 1,
        };
        /* IDE embeddings (JCEF) pass ?theme=<id>: it wins over the cookie and
           is persisted so later loads without the param keep the theme. */
        var q = location.search.match(/[?&]theme=([^&]+)/);
        var qt = q && decodeURIComponent(q[1].replace(/\+/g, " "));
        if (!(qt && VALID[qt])) qt = null;
        var m = document.cookie.match(/(?:^|;\s*)coddy_ui_theme=([^;]+)/);
        var t = m && decodeURIComponent(m[1].replace(/\+/g, " "));
        var theme = qt || (t && VALID[t] ? t : "dark");
        if (qt && qt !== t) {
          document.cookie =
            "coddy_ui_theme=" +
            encodeURIComponent(qt) +
            "; Path=/; Max-Age=31536000; SameSite=Lax" +
            (location.protocol === "https:" ? "; Secure" : "");
        }
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = LIGHT[theme]
          ? "light"
          : "dark";
        /* IDE embeddings (JCEF) pass ?embed=intellij so the SPA can adopt a
           flatter, more native host-IDE look (see docs/intellij-embedding.md). */
        var e = location.search.match(/[?&]embed=([^&]+)/);
        var et = e && decodeURIComponent(e[1].replace(/\+/g, " "));
        if (et && /^[a-z0-9_-]+$/i.test(et)) {
          document.documentElement.dataset.embed = et;
        }
        /* IDE embeddings pass ?lang=en|ru; wins over cookie and sets html[lang]. */
        var l = location.search.match(/[?&]lang=([^&]+)/);
        var lt = l && decodeURIComponent(l[1].replace(/\+/g, " "));
        var VALID_LANG = { en: 1, ru: 1 };
        var ql = lt && VALID_LANG[lt] ? lt : null;
        var lm = document.cookie.match(/(?:^|;\s*)coddy_ui_lang=([^;]+)/);
        var lc = lm && decodeURIComponent(lm[1].replace(/\+/g, " "));
        var lang = ql || (lc && VALID_LANG[lc] ? lc : "en");
        if (ql && ql !== lc) {
          document.cookie =
            "coddy_ui_lang=" +
            encodeURIComponent(ql) +
            "; Path=/; Max-Age=31536000; SameSite=Lax" +
            (location.protocol === "https:" ? "; Secure" : "");
        }
        document.documentElement.lang = lang;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
