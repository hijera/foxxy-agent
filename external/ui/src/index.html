<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>Coddy Agent</title>
    <link rel="icon" href="/coddy-favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script>
      (function () {
        var LIGHT = { light: 1 };
        var VALID = { dark: 1, light: 1, midnight: 1, "solarized-dark": 1, monokai: 1, nord: 1, "rose-pine": 1 };
        var m = document.cookie.match(/(?:^|;\s*)coddy_ui_theme=([^;]+)/);
        var t = m && decodeURIComponent(m[1].replace(/\+/g, " "));
        var theme = (t && VALID[t]) ? t : "dark";
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = LIGHT[theme] ? "light" : "dark";
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
