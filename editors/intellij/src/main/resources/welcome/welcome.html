<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #1e1e1e;
      --muted: #616161;
      --accent: #3574f0;
      --border: #dfe1e5;
      --card: #f7f8fa;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #2b2b2b;
        --fg: #bbbbbb;
        --muted: #888888;
        --accent: #548af7;
        --border: #43454a;
        --card: #313335;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      line-height: 1.55;
      color: var(--fg);
      background: var(--bg);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px 8px;
      border-bottom: 1px solid var(--border);
    }
    .header svg { flex-shrink: 0; }
    .header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }
    .content { padding: 16px 20px 8px; min-height: 220px; }
    .step { display: none; animation: fadeIn 0.2s ease; }
    .step.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .step h2 {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
    }
    .step-body { color: var(--fg); }
    .step-body p { margin: 0 0 8px; }
    .step-body ul { margin: 8px 0; padding-left: 20px; }
    .step-body li { margin-bottom: 4px; }
    .step-body code {
      background: var(--card);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 12px;
    }
    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 12px 0 16px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s;
    }
    .dot.active { background: var(--accent); }
  </style>
</head>
<body>
  <div class="header">
    <svg width="28" height="28" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M4.5 4L2 6.5L4.5 9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M8.5 4L11 6.5L8.5 9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M7.2 2.5L5.8 10.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <h1>FoxxyCode</h1>
  </div>

  <div class="content">
    <section class="step active" data-step="0">
      <h2>%welcome.step1.title%</h2>
      <div class="step-body">%welcome.step1.body%</div>
    </section>
    <section class="step" data-step="1">
      <h2>%welcome.step2.title%</h2>
      <div class="step-body">%welcome.step2.body%</div>
    </section>
    <section class="step" data-step="2">
      <h2>%welcome.step3.title%</h2>
      <div class="step-body">%welcome.step3.body%</div>
    </section>
    <section class="step" data-step="3">
      <h2>%welcome.step4.title%</h2>
      <div class="step-body">%welcome.step4.body%</div>
    </section>
    <section class="step" data-step="4">
      <h2>%welcome.step5.title%</h2>
      <div class="step-body">%welcome.step5.body%</div>
    </section>
  </div>

  <div class="dots" aria-hidden="true">
    <span class="dot active"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>

  <script>
    function setStep(n) {
      var steps = document.querySelectorAll(".step");
      var dots = document.querySelectorAll(".dot");
      for (var i = 0; i < steps.length; i++) {
        steps[i].classList.toggle("active", i === n);
        if (dots[i]) dots[i].classList.toggle("active", i === n);
      }
    }
    window.setStep = setStep;
  </script>
</body>
</html>
