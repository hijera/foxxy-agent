# First-run dialog
firstrun.title=Set Up FoxxyCode
firstrun.body=<html>The foxxycode agent binary is bundled with the FoxxyCode plugin and ready to use.<br/>Just close this dialog and the FoxxyCode tool window will start it automatically.<br/><br/>Optional: configure host, port, FoxxyCode home, or override the binary path in<br/>Settings | Tools | FoxxyCode.</html>

# Welcome wizard
welcome.title=Welcome to FoxxyCode
welcome.step1.title=Welcome
welcome.step1.body=<p>The <b>foxxycode</b> agent binary is bundled with this plugin — no download step.</p><p>Close this wizard and the FoxxyCode tool window will start the server automatically for your open project.</p>
welcome.step2.title=Find the FoxxyCode panel
welcome.step2.body=<p>Open the <b>FoxxyCode</b> tool window on the <b>right edge</b> of the IDE (View → Tool Windows → FoxxyCode).</p><p>The plugin launches <code>foxxycode http</code> scoped to the project root and embeds the full web UI via JCEF.</p>
welcome.step3.title=Set your API key
welcome.step3.body=<p>In the embedded UI open <b>Settings</b> and paste a provider API key.</p><p>Alternatively set <code>OPENAI_API_KEY</code> in the environment before launching the IDE.</p><p>Plugin options: <b>Settings | Tools | FoxxyCode</b> (host, port, binary path, language).</p>
welcome.step4.title=Send your first message
welcome.step4.body=<p>Type a task in the <b>composer</b> at the bottom of the panel.</p><ul><li><b>Mode</b> — agent, plan, or docs</li><li><b>Model</b> — pick a backend from the selector above the input</li></ul><p>Press Enter to send. Sessions are stored under <code>~/.foxxycode</code>.</p>
welcome.step5.title=Review edits and toolbar
welcome.step5.body=<p>When the agent edits a file, the IDE shows <b>native inline diffs</b> with Accept / Reject / Show diff / Revert.</p><p>Toolbar: <b>Restart</b>, <b>Reload</b>, <b>Open in Browser</b>, <b>DevTools</b>, <b>Settings</b>.</p><p>Re-open this tour anytime via <b>Tools → Show FoxxyCode Welcome</b>.</p>
welcome.button.prev=Back
welcome.button.next=Next
welcome.button.finish=Finish
welcome.button.skip=Skip
welcome.fallback.body=<html><p><b>Welcome to FoxxyCode</b></p><p>The foxxycode binary is bundled with the plugin. Open the <b>FoxxyCode</b> tool window on the right, set an API key in the UI Settings, then chat in the composer.</p><p>Configure the plugin under <b>Settings | Tools | FoxxyCode</b>. Re-open this tour via <b>Tools → Show FoxxyCode Welcome</b>.</p></html>

action.welcome.text=Show FoxxyCode Welcome
action.welcome.description=Re-open the FoxxyCode onboarding tour

