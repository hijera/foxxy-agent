# First-run dialog
firstrun.title=Настройка FoxxyCode
firstrun.body=<html>Бинарник агента foxxycode встроен в плагин FoxxyCode и готов к работе.<br/>Закройте этот диалог — окно FoxxyCode запустит его автоматически.<br/><br/>При необходимости настройте хост, порт, домашнюю папку FoxxyCode или путь к бинарнику в<br/>Settings | Tools | FoxxyCode.</html>

# Welcome wizard
welcome.title=Добро пожаловать в FoxxyCode
welcome.step1.title=Приветствие
welcome.step1.body=<p>Бинарник агента <b>foxxycode</b> встроен в плагин — ничего скачивать не нужно.</p><p>Закройте мастер — окно FoxxyCode автоматически запустит сервер для открытого проекта.</p>
welcome.step2.title=Где панель FoxxyCode
welcome.step2.body=<p>Откройте tool window <b>FoxxyCode</b> на <b>правом краю</b> IDE (View → Tool Windows → FoxxyCode).</p><p>Плагин запускает <code>foxxycode http</code> с корнем в каталоге проекта и встраивает полный web UI через JCEF.</p>
welcome.step3.title=Укажите API-ключ
welcome.step3.body=<p>Во встроенном UI откройте <b>Settings</b> и вставьте API-ключ провайдера.</p><p>Либо задайте <code>OPENAI_API_KEY</code> в окружении до запуска IDE.</p><p>Настройки плагина: <b>Settings | Tools | FoxxyCode</b> (хост, порт, путь к бинарнику, язык).</p>
welcome.step4.title=Первое сообщение
welcome.step4.body=<p>Введите задачу в <b>composer</b> внизу панели.</p><ul><li><b>Mode</b> — agent, plan или docs</li><li><b>Model</b> — выберите бэкенд в селекторе над полем ввода</li></ul><p>Enter — отправить. Сессии хранятся в <code>~/.foxxycode</code>.</p>
welcome.step5.title=Правки и панель инструментов
welcome.step5.body=<p>При правках файлов IDE показывает <b>нативные inline-диффы</b> с Accept / Reject / Show diff / Revert.</p><p>Панель: <b>Restart</b>, <b>Reload</b>, <b>Open in Browser</b>, <b>DevTools</b>, <b>Settings</b>.</p><p>Повторно открыть тур: <b>Tools → Show FoxxyCode Welcome</b>.</p>
welcome.button.prev=Назад
welcome.button.next=Далее
welcome.button.finish=Готово
welcome.button.skip=Пропустить
welcome.fallback.body=<html><p><b>Добро пожаловать в FoxxyCode</b></p><p>Бинарник foxxycode встроен в плагин. Откройте tool window <b>FoxxyCode</b> справа, укажите API-ключ в Settings UI и начните чат в composer.</p><p>Настройки плагина: <b>Settings | Tools | FoxxyCode</b>. Повторный тур: <b>Tools → Show FoxxyCode Welcome</b>.</p></html>

action.welcome.text=Показать приветствие FoxxyCode
action.welcome.description=Повторно открыть тур по FoxxyCode

